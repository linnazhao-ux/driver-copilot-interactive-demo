<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buyer Call Experience Comparison</title>
  <style>
    :root {
      --primary: #ee4d2d;
      --primary-dark: #d83f24;
      --ink: #2f3145;
      --muted: #8c91a3;
      --line: #e9e3ee;
      --page: #150706;
      --soft: #fff4f0;
      --success: #27b36a;
      --danger: #ef4444;
      --blue: #2878f0;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at 24% 12%, rgba(238, 77, 45, .34), transparent 34%),
        linear-gradient(145deg, #230806 0%, #120606 54%, #08050a 100%);
      color: var(--ink);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    button {
      border: 0;
      font: inherit;
      cursor: pointer;
    }

    .demo-shell {
      width: 375px;
    }

    .prototype-head {
      margin-bottom: 12px;
      color: #fff;
    }

    .prototype-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .prototype-title h1 {
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .reset-btn {
      height: 34px;
      padding: 0 14px;
      border: 1px solid rgba(255,255,255,.34);
      border-radius: 999px;
      color: #fff;
      background: rgba(255,255,255,.12);
      backdrop-filter: blur(12px);
      font-size: 13px;
      font-weight: 700;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 4px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 16px;
      background: rgba(255,255,255,.1);
      backdrop-filter: blur(14px);
    }

    .mode-tab {
      height: 42px;
      border-radius: 12px;
      color: rgba(255,255,255,.76);
      background: transparent;
      font-size: 14px;
      font-weight: 800;
    }

    .mode-tab.active {
      color: #fff;
      background: linear-gradient(135deg, #ff7a3d 0%, var(--primary) 100%);
      box-shadow: 0 10px 24px rgba(238,77,45,.32);
    }

    .phone {
      position: relative;
      width: 375px;
      height: 812px;
      padding: 14px 12px 12px;
      border-radius: 46px;
      background: #101010;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.16), 0 24px 80px rgba(0,0,0,.48);
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border-radius: 36px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.2), transparent 26%),
        linear-gradient(180deg, #fff 0%, #fff 8%, #f8f2fb 100%);
    }

    .status-bar {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      color: #111;
      font-size: 16px;
      font-weight: 900;
    }

    .notch {
      position: absolute;
      top: 10px;
      left: 50%;
      width: 118px;
      height: 34px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #111;
    }

    .battery {
      width: 24px;
      height: 12px;
      border: 2px solid currentColor;
      border-radius: 4px;
      position: relative;
    }

    .battery::after {
      content: "";
      position: absolute;
      right: -5px;
      top: 3px;
      width: 3px;
      height: 5px;
      border-radius: 2px;
      background: currentColor;
    }

    .battery span {
      display: block;
      width: 13px;
      height: 6px;
      margin: 1px;
      border-radius: 2px;
      background: currentColor;
    }

    .screen-body {
      height: calc(100% - 44px);
      display: flex;
      flex-direction: column;
    }

    .call-page {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 18px 18px 26px;
    }

    .call-page.incoming {
      color: #fff;
      background:
        radial-gradient(circle at 50% 18%, rgba(255,255,255,.14), transparent 32%),
        linear-gradient(160deg, #303346 0%, #121827 55%, #0b101d 100%);
    }

    .call-page.connected {
      background: linear-gradient(180deg, #fff 0%, #fff7f4 42%, #f8f2fb 100%);
    }

    .incoming-top {
      text-align: center;
      padding-top: 54px;
    }

    .caller-avatar {
      width: 92px;
      height: 92px;
      display: grid;
      place-items: center;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff8151, #e93628);
      box-shadow: 0 20px 60px rgba(238,77,45,.4);
      color: #fff;
      font-size: 42px;
      font-weight: 900;
    }

    .caller-name {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0;
    }

    .caller-sub {
      margin-top: 10px;
      color: rgba(255,255,255,.68);
      font-size: 15px;
      line-height: 1.5;
    }

    .order-chip {
      display: inline-flex;
      align-items: center;
      margin-top: 18px;
      padding: 8px 12px;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.86);
      font-size: 12px;
      font-weight: 700;
    }

    .incoming-actions {
      display: flex;
      justify-content: space-between;
      margin-top: auto;
      padding: 0 34px 34px;
    }

    .round-action {
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      box-shadow: 0 16px 32px rgba(0,0,0,.24);
    }

    .round-action svg {
      width: 32px;
      height: 32px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.6;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hangup {
      background: var(--danger);
    }

    .answer {
      background: var(--success);
    }

    .call-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(47,49,69,.08);
    }

    .call-status strong {
      display: block;
      color: var(--ink);
      font-size: 17px;
      font-weight: 900;
    }

    .call-status span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .live-dot {
      width: 9px;
      height: 9px;
      margin-right: 6px;
      border-radius: 50%;
      background: var(--success);
      box-shadow: 0 0 0 6px rgba(39,179,106,.1);
    }

    .connected-pill {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      color: #14844a;
      background: #eaf8f0;
      font-size: 12px;
      font-weight: 800;
    }

    .call-log {
      flex: 1;
      overflow: hidden;
      padding: 20px 0 12px;
    }

    .bubble-row {
      display: flex;
      margin-bottom: 12px;
    }

    .bubble-row.user {
      justify-content: flex-end;
    }

    .bubble {
      max-width: 286px;
      padding: 13px 14px;
      border-radius: 18px;
      border: 1px solid rgba(233,227,238,.95);
      background: #fff;
      color: var(--ink);
      box-shadow: 0 8px 20px rgba(28, 18, 38, .05);
      font-size: 15px;
      line-height: 1.55;
    }

    .bubble.system {
      border-bottom-left-radius: 6px;
    }

    .bubble.user {
      border: 0;
      border-bottom-right-radius: 6px;
      background: linear-gradient(135deg, #3586ff, #176de4);
      color: #fff;
    }

    .bubble-label {
      display: block;
      margin-bottom: 5px;
      color: var(--primary);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .controls {
      margin-top: auto;
    }

    .ivr-pad {
      display: grid;
      gap: 12px;
    }

    .ivr-key {
      min-height: 64px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      border-radius: 18px;
      border: 1px solid #f1d7d0;
      background:
        linear-gradient(180deg, #fff 0%, #fff8f5 100%);
      box-shadow: 0 10px 0 #f2d6cd, 0 18px 28px rgba(238,77,45,.1);
      color: var(--ink);
      text-align: left;
    }

    .ivr-key:active {
      transform: translateY(4px);
      box-shadow: 0 6px 0 #f2d6cd, 0 12px 20px rgba(238,77,45,.1);
    }

    .ivr-key strong {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: var(--primary);
      color: #fff;
      font-size: 22px;
      font-weight: 900;
    }

    .ivr-key span {
      font-size: 15px;
      font-weight: 800;
      line-height: 1.25;
    }

    .voice-listen {
      padding: 16px;
      border-radius: 24px;
      border: 1px solid #f4dcd5;
      background: rgba(255,255,255,.72);
      box-shadow: 0 12px 34px rgba(238,77,45,.08);
    }

    .wave-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      height: 74px;
      margin-bottom: 14px;
    }

    .wave-wrap span {
      width: 7px;
      height: 24px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ff8a57, var(--primary));
      animation: wave 1.1s ease-in-out infinite;
    }

    .wave-wrap span:nth-child(2) { animation-delay: .08s; }
    .wave-wrap span:nth-child(3) { animation-delay: .16s; }
    .wave-wrap span:nth-child(4) { animation-delay: .24s; }
    .wave-wrap span:nth-child(5) { animation-delay: .32s; }
    .wave-wrap span:nth-child(6) { animation-delay: .4s; }
    .wave-wrap span:nth-child(7) { animation-delay: .48s; }

    @keyframes wave {
      0%, 100% { height: 18px; opacity: .55; }
      50% { height: 58px; opacity: 1; }
    }

    .voice-hint {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .speech-options {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .speech-option {
      min-height: 48px;
      padding: 10px 14px;
      border-radius: 16px;
      border: 1px solid #f1d7d0;
      background: #fff;
      color: var(--ink);
      font-size: 14px;
      font-weight: 800;
      text-align: left;
    }

    .ended-panel {
      margin-top: auto;
      padding: 15px 16px;
      border-radius: 20px;
      border: 1px solid #e5e0ea;
      background: rgba(255,255,255,.72);
    }

    .ended-status {
      display: flex;
      align-items: center;
      gap: 9px;
      color: #7e8495;
      font-size: 15px;
      font-weight: 900;
    }

    .ended-status::before {
      content: "";
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #b8bdca;
    }

    .compare-note {
      margin-top: 10px;
      color: #7d8395;
      font-size: 12px;
      line-height: 1.45;
    }

    .sync-note {
      margin-top: 10px;
      padding: 9px 10px;
      border-radius: 12px;
      background: #eef8f3;
      color: #14844a;
      font-size: 12px;
      font-weight: 800;
    }

    .home-indicator {
      position: absolute;
      bottom: 8px;
      left: 50%;
      width: 130px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: #111;
    }
  </style>
</head>
<body>
  <section class="demo-shell" aria-label="Buyer call comparison prototype">
    <header class="prototype-head">
      <div class="prototype-title">
        <h1>Buyer Call Experience</h1>
        <button class="reset-btn" id="resetBtn">Reset</button>
      </div>
      <nav class="mode-tabs" aria-label="Call mode">
        <button class="mode-tab active" data-mode="ivr">IVR (Rule-based)</button>
        <button class="mode-tab" data-mode="bot">Voice Bot</button>
      </nav>
    </header>

    <div class="phone">
      <div class="screen">
        <div class="notch"></div>
        <div class="status-bar">
          <span>08:41</span>
          <span></span>
          <span style="display:flex;align-items:center;gap:8px;">5G <span class="battery"><span></span></span></span>
        </div>
        <main class="screen-body" id="app"></main>
        <div class="home-indicator"></div>
      </div>
    </div>
  </section>

  <script>
    const app = document.getElementById("app");
    const resetBtn = document.getElementById("resetBtn");
    const tabs = [...document.querySelectorAll(".mode-tab")];

    const order = {
      id: "PH005314767588",
      address: "Kampung Baru, Road 3, blue gate near mini mart"
    };

    const phoneIcon = `
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.8 19.8 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.35 1.9.66 2.81a2 2 0 0 1-.45 2.11L8.05 9.91a16 16 0 0 0 6.04 6.04l1.27-1.27a2 2 0 0 1 2.11-.45c.91.31 1.85.53 2.81.66A2 2 0 0 1 22 16.92z"/>
      </svg>`;

    const state = {
      mode: "ivr",
      step: "incoming",
      ivrChoice: null,
      userText: null,
      botReply: null
    };

    function reset(mode = state.mode) {
      state.mode = mode;
      state.step = "incoming";
      state.ivrChoice = null;
      state.userText = null;
      state.botReply = null;
      tabs.forEach(tab => tab.classList.toggle("active", tab.dataset.mode === mode));
      render();
    }

    function incomingView() {
      return `
        <section class="call-page incoming">
          <div class="incoming-top">
            <div class="caller-avatar">D</div>
            <div class="caller-name">Delivery Service</div>
            <div class="caller-sub">In-app delivery call<br />Incoming call from driver workflow</div>
            <div class="order-chip">${order.id} | Delivery today</div>
          </div>
          <div class="incoming-actions">
            <button class="round-action hangup" data-action="end" aria-label="Decline call">${phoneIcon}</button>
            <button class="round-action answer" data-action="answer" aria-label="Answer call">${phoneIcon}</button>
          </div>
        </section>`;
    }

    function bubble(label, text, side = "system") {
      return `
        <div class="bubble-row ${side === "user" ? "user" : ""}">
          <div class="bubble ${side}">
            ${label ? `<span class="bubble-label">${label}</span>` : ""}
            ${text}
          </div>
        </div>`;
    }

    function connectedHeader() {
      return `
        <div class="call-header">
          <div class="call-status">
            <strong>Delivery Service</strong>
            <span>${order.id}</span>
          </div>
          <div class="connected-pill"><span class="live-dot"></span>Connected</div>
        </div>`;
    }

    function endedPanel(extra = "") {
      const note = state.mode === "ivr"
        ? "Input: numeric keypad only | Flexibility: preset options | Notes: not captured | Sync-back: result status only"
        : "Input: microphone / natural language | Flexibility: free expression | Notes: auto-structured | Sync-back: result + buyer original note";
      return `
        <div class="ended-panel">
          <div class="ended-status">Call ended</div>
          ${extra}
          <div class="compare-note">${note}</div>
        </div>`;
    }

    function ivrView() {
      if (state.step === "incoming") return incomingView();
      if (state.step === "ended") {
        return `
          <section class="call-page connected">
            ${connectedHeader()}
            <div class="call-log">${bubble("System IVR", "The call has ended.")}</div>
            ${endedPanel()}
          </section>`;
      }
      if (state.step === "ivr-confirm") {
        return `
          <section class="call-page connected">
            ${connectedHeader()}
            <div class="call-log">
              ${bubble("System IVR", "Hello, your parcel will be delivered today.<br />Press 1 to confirm receipt, press 2 to reschedule, or press 3 to transfer to customer service.")}
              ${bubble("DTMF input", "Buyer pressed ${state.ivrChoice}", "user")}
              ${bubble("System IVR", state.ivrChoice === "1"
                ? "Confirmed. Thank you for your cooperation."
                : "Connecting you to a live agent...")}
            </div>
            ${endedPanel()}
          </section>`;
      }
      if (state.step === "ivr-reschedule") {
        return `
          <section class="call-page connected">
            ${connectedHeader()}
            <div class="call-log">
              ${bubble("System IVR", "Hello, your parcel will be delivered today.<br />Press 1 to confirm receipt, press 2 to reschedule, or press 3 to transfer to customer service.")}
              ${bubble("DTMF input", "Buyer pressed 2", "user")}
              ${bubble("System IVR", "Press 1 for tomorrow, or press 2 for the day after tomorrow.")}
            </div>
            <div class="controls">
              <div class="ivr-pad">
                <button class="ivr-key" data-action="reschedule" data-day="tomorrow"><strong>1</strong><span>Tomorrow</span></button>
                <button class="ivr-key" data-action="reschedule" data-day="day after tomorrow"><strong>2</strong><span>Day after tomorrow</span></button>
              </div>
            </div>
          </section>`;
      }
      if (state.step === "ivr-rescheduled-end") {
        return `
          <section class="call-page connected">
            ${connectedHeader()}
            <div class="call-log">
              ${bubble("System IVR", "Press 1 for tomorrow, or press 2 for the day after tomorrow.")}
              ${bubble("DTMF input", `Buyer selected ${state.ivrChoice}`, "user")}
              ${bubble("System IVR", "Your delivery has been rescheduled. Goodbye.")}
            </div>
            ${endedPanel()}
          </section>`;
      }
      return `
        <section class="call-page connected">
          ${connectedHeader()}
          <div class="call-log">
            ${bubble("System IVR", "Hello, your parcel will be delivered today.<br />Press 1 to confirm receipt, press 2 to reschedule, or press 3 to transfer to customer service.")}
          </div>
          <div class="controls">
            <div class="ivr-pad">
              <button class="ivr-key" data-action="ivr-key" data-key="1"><strong>1</strong><span>Confirm receipt</span></button>
              <button class="ivr-key" data-action="ivr-key" data-key="2"><strong>2</strong><span>Reschedule delivery</span></button>
              <button class="ivr-key" data-action="ivr-key" data-key="3"><strong>3</strong><span>Transfer to agent</span></button>
            </div>
          </div>
        </section>`;
    }

    const voiceReplies = {
      home: {
        text: "Yes, I am at home",
        reply: "Got it. Confirmed. The driver will deliver your parcel soon. Thank you!",
        note: "Buyer available at home"
      },
      tomorrow: {
        text: "I am not available today. Can you deliver tomorrow?",
        reply: "Sure. Your delivery has been rescheduled to tomorrow. You will receive an SMS confirmation shortly.",
        note: "Reschedule to tomorrow"
      },
      guard: {
        text: "Please leave it at the guard house",
        reply: "Got it. I have added the note: leave it at the guard house. Thank you!",
        note: "Leave parcel at guard house"
      }
    };

    function waveform() {
      return `<div class="wave-wrap" aria-label="Listening waveform">
        <span></span><span></span><span></span><span></span><span></span><span></span><span></span>
      </div>`;
    }

    function botView() {
      if (state.step === "incoming") return incomingView();
      if (state.step === "ended") {
        return `
          <section class="call-page connected">
            ${connectedHeader()}
            <div class="call-log">${bubble("Voice Bot", "Call completed.")}</div>
            ${endedPanel()}
          </section>`;
      }
      if (state.step === "voice-response") {
        return `
          <section class="call-page connected">
            ${connectedHeader()}
            <div class="call-log">
              ${bubble("Voice Bot", "Hello! Your parcel is scheduled for delivery today. Are you available to receive it?")}
              ${bubble("Speech recognition", state.userText, "user")}
              ${bubble("Voice Bot", state.botReply)}
            </div>
            ${endedPanel(`<div class="sync-note">Buyer note auto-captured | synced to driver app<br />${state.note}</div>`)}
          </section>`;
      }
      return `
        <section class="call-page connected">
          ${connectedHeader()}
          <div class="call-log">
            ${bubble("Voice Bot", "Hello! Your parcel is scheduled for delivery today. Are you available to receive it?")}
          </div>
          <div class="controls">
            <div class="voice-listen">
              ${waveform()}
              <div class="voice-hint">Listening | buyer can speak naturally</div>
              <div class="speech-options">
                <button class="speech-option" data-action="say" data-intent="home">Yes, I am at home</button>
                <button class="speech-option" data-action="say" data-intent="tomorrow">I am not available today. Can you deliver tomorrow?</button>
                <button class="speech-option" data-action="say" data-intent="guard">Please leave it at the guard house</button>
              </div>
            </div>
          </div>
        </section>`;
    }

    function render() {
      app.innerHTML = state.mode === "ivr" ? ivrView() : botView();
    }

    document.addEventListener("click", event => {
      const tab = event.target.closest(".mode-tab");
      if (tab) {
        reset(tab.dataset.mode);
        return;
      }

      const actionEl = event.target.closest("[data-action]");
      if (!actionEl) return;
      const action = actionEl.dataset.action;

      if (action === "answer") {
        state.step = state.mode === "ivr" ? "ivr-menu" : "voice-open";
      }

      if (action === "end") {
        state.step = "ended";
      }

      if (action === "ivr-key") {
        state.ivrChoice = actionEl.dataset.key;
        if (state.ivrChoice === "2") {
          state.step = "ivr-reschedule";
        } else {
          state.step = "ivr-confirm";
        }
      }

      if (action === "reschedule") {
        state.ivrChoice = actionEl.dataset.day;
        state.step = "ivr-rescheduled-end";
      }

      if (action === "say") {
        const result = voiceReplies[actionEl.dataset.intent];
        state.userText = result.text;
        state.botReply = result.reply;
        state.note = result.note;
        state.step = "voice-response";
      }

      render();
    });

    resetBtn.addEventListener("click", () => reset());
    render();
  </script>
</body>
</html>
